<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ institute_name }} - Track Letter</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .track-grid{display:grid;grid-template-columns:440px 1fr;gap:20px}
    .reader{min-height:320px;border:1px solid rgba(122,74,44,.14);border-radius:16px;padding:8px;background:#fffdf9}
    .progress{height:12px;border-radius:999px;background:#ead9c9;overflow:hidden}
    .progress div{height:100%;width:0;background:linear-gradient(90deg,var(--coffee-700),var(--coffee-500));transition:width .25s ease}
    @media(max-width:920px){.track-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container">
    {% set portal_tag = 'Track Letter' %}
    {% include '_brand_banner.html' %}

    <div class="card">
      <h2 style="margin:0;">Scan to Check Status</h2>
      <p class="muted" style="margin-top:8px;">Scan the QR code from the generated letter or paste the raw QR text manually.</p>

      <div class="track-grid" style="margin-top:18px;">
        <div id="reader" class="reader"></div>
        <div>
          <div class="progress"><div id="bar"></div></div>
          <div class="card" style="margin-top:14px;background:#fffdf9;">
            <div id="statusText" style="font-size:1.1rem;font-weight:700;">Awaiting scan</div>
            <div id="details" class="muted" style="margin-top:10px;">Point the camera at the QR code generated by this system.</div>
          </div>

          <div style="margin-top:16px;">
            <label for="manualInput">Manual Decode Test</label>
            <input class="input" id="manualInput" type="text" placeholder="Paste QR text here if needed">
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;">
              <button class="btn" id="testDecode" type="button">Check Status</button>
              <a class="btn btn-soft" href="/dashboard/student">Back to dashboard</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function extractAppId(text){
      if(!text){ return null; }
      const value = text.trim();
      if(!value){ return null; }
      try{
        const parsed = new URL(value);
        const id = parsed.searchParams.get("id");
        if(id){ return id; }
      }catch(error){}
      if(value.includes("|")){
        const parts = value.split("|").map(item => item.trim()).filter(Boolean);
        const candidate = parts[parts.length - 1];
        if(/^[A-Za-z0-9_-]{6,32}$/.test(candidate)){ return candidate; }
      }
      if(/^[A-Za-z0-9_-]{6,32}$/.test(value)){ return value; }
      return null;
    }

    function renderStatus(letter){
      const widths = {Created: 20, Submitted: 45, Pending: 70, Approved: 100};
      document.getElementById("statusText").textContent = letter.state;
      document.getElementById("details").innerHTML = `
        <strong>Letter ID:</strong> ${letter.app_id}<br>
        <strong>Name:</strong> ${letter.name}<br>
        <strong>Email:</strong> ${letter.email}<br>
        <strong>Subject:</strong> ${letter.subject || "-"}<br>
        <strong>Created At:</strong> ${letter.created_at || "-"}<br>
        <strong>Submitted At:</strong> ${letter.submitted_at || "-"}<br>
        <strong>Approved At:</strong> ${letter.approved_at || "-"}
      `;
      document.getElementById("bar").style.width = (widths[letter.state] || 0) + "%";
    }

    async function loadStatus(appId){
      const statusText = document.getElementById("statusText");
      const details = document.getElementById("details");
      statusText.textContent = "Checking status...";
      details.textContent = "Please wait.";
      try{
        const response = await fetch("/status_api?id=" + encodeURIComponent(appId));
        const data = await response.json();
        if(!response.ok){
          statusText.textContent = data.message || "Unable to fetch status";
          details.textContent = "Make sure you are logged into the correct account.";
          document.getElementById("bar").style.width = "0%";
          return;
        }
        renderStatus(data);
      }catch(error){
        statusText.textContent = "Status lookup failed";
        details.textContent = "Please try again.";
        document.getElementById("bar").style.width = "0%";
      }
    }

    function onScanSuccess(decodedText){
      const appId = extractAppId(decodedText);
      if(!appId){
        document.getElementById("statusText").textContent = "Invalid QR code";
        document.getElementById("details").textContent = "This QR code does not contain a valid letter ID.";
        document.getElementById("bar").style.width = "0%";
        return;
      }
      document.getElementById("manualInput").value = decodedText;
      loadStatus(appId);
    }

    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 240 });
    scanner.render(onScanSuccess);

    document.getElementById("testDecode").addEventListener("click", function(){
      const raw = document.getElementById("manualInput").value.trim();
      const appId = extractAppId(raw);
      if(!appId){
        document.getElementById("statusText").textContent = "Invalid input";
        document.getElementById("details").textContent = "Paste a valid QR payload or tracking link.";
        document.getElementById("bar").style.width = "0%";
        return;
      }
      loadStatus(appId);
    });
  </script>
</body>
</html>
